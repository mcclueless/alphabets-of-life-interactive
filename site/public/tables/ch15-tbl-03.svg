<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 320 144" role="img" font-family="Georgia, serif" font-size="13" fill="#1a1a1a"><rect width="320" height="144" fill="#fbfaf6"/><line x1="0" y1="0" x2="0" y2="144" stroke="#cfc8b8" stroke-width="1"/><line x1="320" y1="0" x2="320" y2="144" stroke="#cfc8b8" stroke-width="1"/><rect x="0" y="0" width="320" height="144" fill="#f0eadd"/><line x1="0" y1="0" x2="320" y2="0" stroke="#cfc8b8" stroke-width="1"/><text x="12" y="20" font-weight="600">From this evolves a highly complex</text><text x="12" y="36" font-weight="600">sacred geometry which others have</text><text x="12" y="52" font-weight="600">discussed in detail. For instance, the</text><text x="12" y="68" font-weight="600">first two numbers of the holographic</text><text x="12" y="84" font-weight="600">generating set (27, 37, 73), when added</text><text x="12" y="100" font-weight="600">together, lead to the gematria for</text><text x="12" y="116" font-weight="600">Aletheia (27 + 37 = 64 = truth in</text><text x="12" y="132" font-weight="600">Greek):</text><line x1="0" y1="144" x2="320" y2="144" stroke="#cfc8b8" stroke-width="1"/></svg>